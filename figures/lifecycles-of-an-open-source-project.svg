<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 160">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5a6a9a"/>
    </marker>
  </defs>

  <!-- Proposal -->
  <circle cx="80" cy="80" r="60" fill="#2c3e6b"/>
  <text x="80" y="82" text-anchor="middle" dy="0.35em"
        fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold">Proposal</text>

  <!-- Arrow 1 -->
  <line x1="140" y1="80" x2="210" y2="80" stroke="#5a6a9a" stroke-width="5" marker-end="url(#arrow)"/>

  <!-- Incubation -->
  <circle cx="280" cy="80" r="60" fill="#7b8bb5"/>
  <text x="280" y="82" text-anchor="middle" dy="0.35em"
        fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold">Incubation</text>

  <!-- Arrow 2 -->
  <line x1="340" y1="80" x2="410" y2="80" stroke="#5a6a9a" stroke-width="5" marker-end="url(#arrow)"/>

  <!-- Mature -->
  <circle cx="480" cy="80" r="60" fill="#4a5a8a"/>
  <text x="480" y="82" text-anchor="middle" dy="0.35em"
        fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold">Mature</text>

  <!-- Arrow 3 -->
  <line x1="540" y1="80" x2="610" y2="80" stroke="#5a6a9a" stroke-width="5" marker-end="url(#arrow)"/>

  <!-- Core -->
  <circle cx="680" cy="80" r="60" fill="#2c3e6b"/>
  <text x="680" y="82" text-anchor="middle" dy="0.35em"
        fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold">Core</text>

  <!-- Arrow 4 -->
  <line x1="740" y1="80" x2="810" y2="80" stroke="#5a6a9a" stroke-width="5" marker-end="url(#arrow)"/>

  <!-- Archived -->
  <circle cx="880" cy="80" r="60" fill="#7b8bb5"/>
  <text x="880" y="82" text-anchor="middle" dy="0.35em"
        fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold">Archived</text>
</svg>
